name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/mcjel --timeout=600 --async --format='value(id)' > /tmp/build_id.txt
          BUILD_ID=$(cat /tmp/build_id.txt)
          echo "Build ID: $BUILD_ID"
          # Wait for build to complete
          while true; do
            STATUS=$(gcloud builds describe $BUILD_ID --format='value(status)')
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 15
          done

      - name: Deploy
        run: |
          gcloud run deploy mcjel \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/mcjel \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated
