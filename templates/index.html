<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>McJEL - Software Development</title>
  <link rel="icon" href="/static/favicon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="scene">
    <div class="terminal">
      <div class="line prompt">$ whoami</div>
      <div class="line typed" style="--delay:0.5s;--chars:5">McJEL</div>
      <div class="line prompt" style="--delay:1.5s">$ cat mission.txt</div>
      <div class="line typed dim" style="--delay:2.2s;--chars:26">Software Development Studio</div>
      <div class="line prompt" style="--delay:3.5s">$ ls services/</div>
      <div class="services" style="--delay:4.2s">
        <span class="service">mobile/</span>
        <span class="service">web/</span>
        <span class="service">iot/</span>
        <span class="service">embedded/</span>
      </div>
      <div class="line prompt blink" style="--delay:5s">$ <span class="cursor">_</span></div>
    </div>
    <div class="grid-bg"></div>
  </div>
  <footer>&copy; 2026 McJEL, LLC.</footer>
</body>
</html>
